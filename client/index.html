<!DOCTYPE html>

<html lang="en">
  <head>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="description" content="This is SecurityGPT" />
    <title>SecurityGPT</title>

    <style>
      #construction-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 70vh;
        text-align: center;
      }

      .construction-box {
        background: rgba(0, 0, 0, 0.6);
        padding: 40px;
        border-radius: 15px;
        border: 1px solid rgba(255,255,255,0.2);
        max-width: 500px;
      }

      .construction-box h1 {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .construction-box p {
        color: #ccc;
        font-size: 1rem;
      }

      .badge {
        margin-top: 20px;
        display: inline-block;
        padding: 8px 16px;
        border-radius: 20px;
        background: #38bdf8;
        color: #000;
        font-weight: bold;
      }

      .dots::after {
        content: "";
        animation: dots 1.5s steps(4, end) infinite;
      }

      @keyframes dots {
        0% { content: ""; }
        25% { content: "."; }
        50% { content: ".."; }
        75% { content: "..."; }
        100% { content: ""; }
      }
    </style>
  </head>

  <body>
    <header>
      <img class="perrigoLogo" src="images/secBotLogo.PNG" alt="perrigo logo" />
      <p id="headerText">SecurityGPT</p>
    </header>

    <div id="app">
      <div id="construction-container">
        <div class="construction-box">
          <h1>SecurityGPT is Under Construction</h1>
          <p>
            We’re building a smarter cybersecurity assistant.<br />
            Check back soon<span class="dots"></span>
          </p>
          <div class="badge">AI Coming Soon</div>
        </div>
      </div>
    </div>

    <footer></footer>
  </body>
</html>
